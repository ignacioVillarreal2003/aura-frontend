<div class="rp-root">

  @if (loading()) {
    <div class="rp-loading">
      <i class="pi pi-spin pi-spinner rp-loading__icon" aria-hidden="true"></i>
      <span class="rp-loading__text">Cargando informe…</span>
    </div>
  } @else if (report(); as r) {

    <!-- Top bar -->
    <header class="rp-bar">
      <div class="rp-bar__left">
        <button type="button" class="rp-back" (click)="goBack()">
          <i class="pi pi-arrow-left" aria-hidden="true"></i>
          <span>Volver</span>
        </button>
        <div class="rp-vdivider" aria-hidden="true"></div>
        <span class="rp-type-badge rp-type-badge--{{ r.type.toLowerCase() }}">{{ r.type }}</span>
        <span class="rp-title" [title]="r.title">{{ r.title }}</span>
      </div>

      <div class="rp-bar__right">
        <button
          type="button"
          class="rp-icon-btn"
          title="Exportar como PDF"
          [disabled]="exportingAs() !== null"
          (click)="export('pdf')"
        >
          <i [ngClass]="['pi', exportingAs() === 'pdf' ? 'pi-spin pi-spinner' : 'pi-file-pdf']" aria-hidden="true"></i>
          <span>PDF</span>
        </button>
        <button
          type="button"
          class="rp-icon-btn"
          title="Exportar como Markdown"
          [disabled]="exportingAs() !== null"
          (click)="export('markdown')"
        >
          <i [ngClass]="['pi', exportingAs() === 'markdown' ? 'pi-spin pi-spinner' : 'pi-download']" aria-hidden="true"></i>
          <span>.md</span>
        </button>
      </div>
    </header>

    <!-- Document -->
    <main class="rp-body">
      <app-report-document [report]="r" />
    </main>

  }
</div>
