<div class="herramientas-hub">
  <div class="herramientas-hub__inner">
    <header class="herramientas-hub__header">
      <h1 class="herramientas-hub__title">Herramientas</h1>
      <p class="herramientas-hub__subtitle">
        Utilidades para trabajar con documentos. Elegí una opción.
      </p>
    </header>

    <ul class="herramientas-hub__grid" role="list">
      @for (t of tools; track t.path) {
        <li role="listitem">
          <a [routerLink]="[t.path]" class="herramientas-tile">
            <span class="herramientas-tile__icon" aria-hidden="true">
              <i [class]="t.icon"></i>
            </span>
            <span class="herramientas-tile__body">
              <span class="herramientas-tile__title">{{ t.title }}</span>
              <span class="herramientas-tile__desc">{{ t.description }}</span>
            </span>
            <i class="pi pi-chevron-right herramientas-tile__chev" aria-hidden="true"></i>
          </a>
        </li>
      }
    </ul>
  </div>
</div>
