<div class="re-root">

  @if (loading()) {
    <div class="re-loading">
      <i class="pi pi-spin pi-spinner re-loading__icon" aria-hidden="true"></i>
      <span class="re-loading__text">Cargando informe…</span>
    </div>
  } @else if (report(); as r) {

    <!-- Top bar -->
    <header class="re-bar">
      <div class="re-bar__left">
        <button type="button" class="re-back" (click)="goBack()">
          <i class="pi pi-arrow-left" aria-hidden="true"></i>
          <span>Volver</span>
        </button>
        <div class="re-vdivider" aria-hidden="true"></div>
        <span class="re-type-badge re-type-badge--{{ r.type.toLowerCase() }}">{{ r.type }}</span>
        <span class="re-title">{{ r.title }}</span>
      </div>

      <div class="re-bar__right">
        <button
          type="button"
          class="re-icon-btn"
          title="Exportar como PDF"
          [disabled]="exportingAs() !== null"
          (click)="export('pdf')"
        >
          <i [ngClass]="['pi', exportingAs() === 'pdf' ? 'pi-spin pi-spinner' : 'pi-file-pdf']" aria-hidden="true"></i>
          <span>PDF</span>
        </button>
        <button
          type="button"
          class="re-icon-btn"
          title="Exportar como Markdown"
          [disabled]="exportingAs() !== null"
          (click)="export('markdown')"
        >
          <i [ngClass]="['pi', exportingAs() === 'markdown' ? 'pi-spin pi-spinner' : 'pi-download']" aria-hidden="true"></i>
          <span>.md</span>
        </button>
      </div>
    </header>

    <!-- Meta strip -->
    <div class="re-meta">
      <span class="re-meta__item">
        <i class="pi pi-calendar" aria-hidden="true"></i>
        {{ r.created_at | date: 'd MMM yyyy' }}
      </span>
      <span class="re-meta__sep" aria-hidden="true">·</span>
      <span class="re-meta__item">
        <i class="pi pi-bolt" aria-hidden="true"></i>
        {{ r.mode === 'rag' ? 'Con documentos' : 'Directo' }}
      </span>
    </div>

    <!-- Main content -->
    <main class="re-body">
      <div class="re-preview-wrap">
        @if (r.content.trim()) {
          <article class="re-doc">
            <div class="re-doc__body" [innerHTML]="r.content | markdown"></div>
          </article>
        } @else {
          <div class="re-empty">
            <i class="pi pi-file-edit" aria-hidden="true"></i>
            <p>Sin contenido.</p>
          </div>
        }
      </div>
    </main>

  }
</div>
