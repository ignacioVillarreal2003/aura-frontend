<div class="ds-root">
  @if (loading()) {
    <div class="ds-loading">
      <i class="pi pi-spin pi-spinner ds-loading__spinner" aria-hidden="true"></i>
      <p class="ds-loading__text">Cargando resumen…</p>
    </div>
  } @else if (summary(); as s) {
    <app-artifact-header
      [title]="s.title"
      [description]="s.description"
      [exporting]="exportingAs()"
      (back)="goBack()"
      (exportRequested)="export($event)"
    />

    <div class="ds-meta">
      <span class="ds-meta__chip">
        <i class="pi pi-calendar" aria-hidden="true"></i>
        {{ s.created_at | date:'mediumDate' }}
      </span>
    </div>

    <div class="ds-body">
      @if (s.summary.trim()) {
        <div class="ds-prose" [innerHTML]="s.summary | markdown"></div>
      } @else {
        <div class="ds-empty">
          <i class="pi pi-file-edit ds-empty__icon" aria-hidden="true"></i>
          <p>Sin contenido.</p>
        </div>
      }
    </div>
  }
</div>
