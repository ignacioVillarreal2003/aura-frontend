<div class="da-root">
  @if (loading()) {
    <div class="da-loading">
      <i class="pi pi-spin pi-spinner da-loading__spinner" aria-hidden="true"></i>
      <p class="da-loading__text">Cargando acción…</p>
    </div>
  } @else if (action(); as a) {
    <app-artifact-header
      [title]="a.title"
      [description]="a.instruction"
      [exporting]="exportingAs()"
      (back)="goBack()"
      (exportRequested)="export($event)"
    />

    <div class="da-meta">
      <span class="da-meta__chip">
        <i class="pi pi-cog" aria-hidden="true"></i>
        {{ actionLabel(a.action) }}
      </span>
      <span class="da-meta__chip">
        <i class="pi pi-file" aria-hidden="true"></i>
        {{ a.document_ids.length }} documento{{ a.document_ids.length !== 1 ? 's' : '' }}
      </span>
      <span class="da-meta__chip">
        <i class="pi pi-calendar" aria-hidden="true"></i>
        {{ a.created_at | date:'dd/MM/yyyy HH:mm' }}
      </span>
    </div>

    <div class="da-body">
      <div class="da-section da-section--result">
        <span class="da-section__label">
          <i class="pi pi-sparkles" aria-hidden="true"></i>
          Resultado
        </span>
        <div class="da-preview">
          @if (a.result.trim()) {
            <div class="da-preview__body" [innerHTML]="a.result | markdown"></div>
          } @else {
            <div class="da-preview__empty">
              <i class="pi pi-file-edit" aria-hidden="true"></i>
              <p>Sin resultado.</p>
            </div>
          }
        </div>
      </div>
    </div>
  }
</div>
