<div class="user-shell">
  <aside class="user-shell__nav" aria-label="Cuenta y preferencias">
    <a routerLink="/main-container" class="user-shell__back">
      <i class="pi pi-arrow-left" aria-hidden="true"></i>
      <span>Volver al chat</span>
    </a>

    <nav class="user-shell__links">
      <a
        routerLink="/user/profile"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="user-shell__link">
        <i class="pi pi-user" aria-hidden="true"></i>
        <span>Mi perfil</span>
      </a>
      <a
        routerLink="/user/notifications"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="user-shell__link">
        <i class="pi pi-inbox" aria-hidden="true"></i>
        <span>Mensajes</span>
      </a>
      <a
        routerLink="/user/general"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="user-shell__link">
        <i class="pi pi-cog" aria-hidden="true"></i>
        <span>General</span>
      </a>
      <a
        routerLink="/user/notification-preferences"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="user-shell__link">
        <i class="pi pi-bell" aria-hidden="true"></i>
        <span>Notificaciones</span>
      </a>
      <a
        routerLink="/user/privacy"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="user-shell__link">
        <i class="pi pi-shield" aria-hidden="true"></i>
        <span>Privacidad</span>
      </a>
      <a
        routerLink="/user/security"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="user-shell__link">
        <i class="pi pi-lock" aria-hidden="true"></i>
        <span>Seguridad</span>
      </a>
      <a
        routerLink="/user/data-control"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="user-shell__link">
        <i class="pi pi-database" aria-hidden="true"></i>
        <span>Control de datos</span>
      </a>
    </nav>

    <button type="button" class="user-shell__logout" (click)="openLogoutModal()">
      <i class="pi pi-sign-out" aria-hidden="true"></i>
      <span>Cerrar sesión</span>
    </button>
  </aside>

  <main class="user-shell__main">
    <router-outlet></router-outlet>
  </main>

  @if (showLogoutModal()) {
    <app-logout-confirmation-modal
      (close)="onCloseLogoutModal()"
      (confirm)="onConfirmLogout()">
    </app-logout-confirmation-modal>
  }
</div>
