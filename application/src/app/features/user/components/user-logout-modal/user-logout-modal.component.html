<div class="modal-overlay" (click)="onClose()" role="presentation">
  <div class="modal-container"
       (click)="$event.stopPropagation()"
       role="dialog"
       aria-modal="true"
       aria-labelledby="logout-modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="logout-modal-title">
        <i class="pi pi-sign-out"></i>
        Cerrar sesión
      </h2>
      <button type="button" class="close-button" (click)="onClose()">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <div class="modal-content">
      <div class="logout-icon">
        <i class="pi pi-sign-out"></i>
      </div>

      <div class="logout-message">
        <p class="logout-question">¿Estás seguro que querés cerrar sesión?</p>
        <p class="logout-description">Tendrás que iniciar sesión nuevamente para acceder a tu cuenta.</p>
      </div>
    </div>

    <div class="modal-footer">
      <button type="button" class="cancel-button" (click)="onCancel()">
        <i class="pi pi-times"></i>
        Cancelar
      </button>
      <button type="button" class="logout-button" (click)="onConfirm()">
        <i class="pi pi-sign-out"></i>
        Cerrar sesión
      </button>
    </div>
  </div>
</div>
