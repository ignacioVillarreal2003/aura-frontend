@if (id) {
  <div class="input-text">
    @if (label()) {
      <label [for]="id">{{label()}}</label>
    }
    <input [id]="id"
           [type]="inputType()"
           [disabled]="disabled()"
           [placeholder]="placeholder()">
    @if (error()) {
      <span>{{error()}}</span>
    }
  </div>
}
