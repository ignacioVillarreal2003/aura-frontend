server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck liviano (mismo patrón que el gateway del back).
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Assets con hash de Angular: cache larga e inmutable.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: cualquier ruta cae en index.html para que resuelva el router de Angular.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
